<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import {NavBar} from "./component/NavBar/script.js";
      import {Movie} from "./component/Movie/script.js";
      import {MovieDetail} from "./component/MovieDetail/script.js";
      import {MovieCategory} from "./component/MovieCategory/script.js";
      import {Profile} from "./component/Profile/script.js";
      
      import {DataMovie} from "./data/dataMovie.js";
      import {DataProfile} from "./data/dataProfile.js";

      // Variable globale pour stocker le profil actif
      window.activeProfile = null;

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      // Bouton d'accueil
      C.handlerHome = function() {
        C.handlerMovies();
      };

      // Bouton de sélection de profil
      C.handlerProfile = function() {
        V.renderProfiles("C.handlerChargeMovie()");
      };

      // Bouton de sélection d'un profil spécifique
      C.handlerProfileId = function(id) {
        // Stocke le profil actif dans une variable globale
        window.activeProfile = id;
      };

      // Bouton de chargement des films liés au profil actif
      C.handlerChargeMovie = function() {
        if (window.activeProfile != null) {
          // Afficher les films liés au profil
          C.handlerMovies();
        }
      }

      // Lire les films et les afficher
      C.handlerMovies = async function() {
        let data = await DataMovie.requestMovies();
        if (data.length != 0){
          V.renderMovies(data);
        }
        else{
          V.renderMovies("Erreur: [Aucun film disponible pour le moment]");
        }
      }

      // Lire les détails d'un film et les afficher
      C.handlerMovieDetail = async function(id) {
        let data = await DataMovie.requestMovieDetails(id);
        if (data != null){
          V.renderMovieDetail(data);
        }
        else{
          V.renderMovieDetail("Erreur: [Aucun détail disponible pour ce film]");
        }
      };

      C.start = function() {
        V.renderNavBar("C.handlerHome()", "C.handlerProfile()");
        V.renderProfiles("C.handlerChargeMovie()");
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = async function(hHome, hProfile) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hHome, hProfile);
      };

      // Afficher les films par catégorie
      V.renderMovies = function(data) {
        let content = document.querySelector("#content");
        let html = "";
        // Parcourir les catégories
        for (let category in data) {
          html += MovieCategory.format(category, data[category]);
        }
        content.innerHTML = html;
      };

      // Afficher les détails du film
      V.renderMovieDetail = function(hDetails) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(hDetails);
      };

      // Afficher les profils
      V.renderProfiles = async function(hChargeMovies) {
        let content = document.querySelector("#content");
        let data = await DataProfile.requestProfiles();
        content.innerHTML = Profile.format(hChargeMovies, data);
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
