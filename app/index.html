<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import {NavBar} from "./component/NavBar/script.js";
      import {Movie} from "./component/Movie/script.js";
      import {MovieDetail} from "./component/MovieDetail/script.js";
      
      import {DataMovie} from "./data/dataMovie.js";

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerHome = function () {
        C.handlerMovie();
      };

      // Lire les films et les afficher
      C.handlerMovie = async function() {
        let data = await DataMovie.requestMovies();
        if (data.length != 0){
          V.renderMovie(data);
        }
        else{
          V.renderMovie(["Aucun film disponible pour le moment"]);
        }
      }

      // Lire les détails d'un film et les afficher
      C.handlerDetail = async function (id) {
        let data = await DataMovie.requestMovieDetails(id);
        if (data != null){
          V.renderMovieDetail(data);
        }
        else{
          V.renderMovieDetail(["Aucun détail disponible pour ce film"]);
        }
      };

      C.start = function () {
        V.renderNavBar("C.handlerHome()");
        C.handlerMovie();
        V.renderMovieDetail("C.handlerDetail(#id)");
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hHome) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hHome);
      };

      // Afficher les films
      V.renderMovie = function (data) {
        let content = document.querySelector("#content");
        content.innerHTML = Movie.format(data);
      };

      // Afficher les détails du film
      V.renderMovieDetail = function (hDetails) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(hDetails);
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
