<li class="profile__item" onclick="C.handlerProfileId({{id}}, {{age}})">
    <figure class="cardProfile">
        <img class="cardProfile__avatar" src="{{avatar}}" alt="">
        <figcaption class="cardProfile__infos">
            <h3 class="cardProfile__pseudo">{{pseudo}}</h3>
            <label class="label {{labelClass}}">{{restriction}}</label>
        </figcaption>
    </figure>
</li>
