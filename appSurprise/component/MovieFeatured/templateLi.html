<li class="movieFeatured__item">
    <figure class="movieFeatured__film" onclick="C.handlerMovieDetail({{id}})">
        <img class="movieFeatured__affiche" src="{{img}}" alt="">
        <figcaption class="movieFeatured__infos">
            <h3 class="movieFeatured__infos-title">{{film_titre}}</h3>
            <p class="movieFeatured__infos-description">{{description}}</p>
        </figcaption>
    </figure>
</li>
