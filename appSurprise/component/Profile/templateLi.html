<li class="profile__item" onclick="C.handlerProfileId(this, {{id}}, {{age}}, '{{pseudo}}')"> <!-- Mot-clé 'this' pour référencer l'élément cliqué -->
    <figure class="cardProfile">
        <img class="cardProfile__avatar" src="{{avatar}}" alt="">
        <figcaption class="cardProfile__infos">
            <h3 class="cardProfile__pseudo">{{pseudo}}</h3>
            <p class="label {{labelClass}}">{{restriction}}</p>
        </figcaption>
    </figure>
</li>
