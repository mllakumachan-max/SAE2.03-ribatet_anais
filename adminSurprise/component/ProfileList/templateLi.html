<li class="profiles__item">
    <figure class="cardProfile">
        <img class="cardProfile__avatar" src="{{avatar}}" alt="{{pseudo}}">
        <figcaption class="cardProfile__infos">
            <h3 class="cardProfile__pseudo">{{pseudo}}</h3>
            <input class="profiles__button" onclick="C.handlerUpdateProfile({{id}}, '{{pseudo}}', '{{avatar}}', {{age}})" type="button" value="Modifier" name="todo">
        </figcaption>
    </figure>
</li>
