<figure class="movieToFeatured__film" id="{{id}}">
    <img class="movieToFeatured__affiche" src="{{img}}" alt="">
    <figcaption class="movieToFeatured__infos">
        <h3 class="movieToFeatured__title">{{film_titre}}</h3>
        <p class="movieToFeatured__category">{{categorie}}</p>
        <p class="movieToFeatured__statut">{{statut}}</p>
    </figcaption>
</figure>
