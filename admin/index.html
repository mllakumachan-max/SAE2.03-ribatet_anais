<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>
    <section id="header"></section>
    <section id="content"></section>

    <script type="module">
      import {NavBar} from "./component/NavBar/script.js";
      import {Notification} from "./component/Notification/script.js";
      
      import {NewMovieForm} from "./component/MovieForm/script.js";
      import {MovieFeaturedForm} from "./component/MovieFeaturedForm/script.js";
      
      import {NewProfileForm} from "./component/ProfileForm/script.js";
      import {ProfileList} from "./component/ProfileList/script.js";
      import {ProfileUpdateForm} from "./component/ProfileUpdateForm/script.js";
      
      import {DataMovie} from "./data/dataMovie.js";
      import {DataProfile} from "./data/dataProfile.js";

      window.C = {};

      // C.start
      C.start = function () {
        V.renderNavBar(
          "V.renderMovie()",
          "V.renderMovieFeatured()",
          "V.renderProfile()",
          "V.renderProfileList()"
        );
        document.querySelector("#header").innerHTML = "";
      };

      C.handlerAnnuler = function(){
        C.start();
      }

      // Movie
      C.readCategorie = async function(){
        let data = await DataMovie.requestCategories();
        let res = [];
        for (let i=0; i < data.length; i++){
          res.push(data[i]);
        }
        return res
      }

      C.handlerAddMovie = async function(){
        let form = document.querySelector('.addMovie__form');
        let fdata = new FormData(form);
        if (form.reportValidity()==false){
          return;
        }
        else{
          let res = await DataMovie.add(fdata);
          // réinitialise le formulaire
          form.reset();
          Notification.show(res);
        }
      }

      // Profile
      C.handlerAddProfile = async function(){
        let form = document.querySelector('.addProfile__form');
        let fdata = new FormData(form);
        if (form.reportValidity()==false){
          return;
        }
        else{
          let res = await DataProfile.add(fdata);
          // réinitialise le formulaire
          form.reset();
          Notification.show(res);
        }
      }

      C.readProfile = async function(){
        return await DataProfile.requestProfiles();
      }

      C.handlerUpdateProfile = function(id, pseudo, avatar, age){
        V.renderProfileUpdate(id, pseudo, avatar, age);
      }

      C.handlerConfirmUpdate = async function(){
        let form = document.querySelector('.updateProfile__form');
        let fdata = new FormData(form);
        if (form.reportValidity()==false){
          return;
        }
        else{
          let res = await DataProfile.update(fdata);
          // includes = cherche un mot dans une phrase
          if (res.includes("succès")){
            // réinitialise le formulaire
            form.reset();
            Notification.show(res, "success");
          }
          else{
            Notification.show(res, "error");
          }
        }
      }

      // Bouton de recherche de films
      C.handlerSearchMovie = async function(search) {
        if (search != "") {
          let data = await DataMovie.requestSearchMovies(search);
          if (data.length != 0){
            document. querySelector(".searchMovies__list").innerHTML = Search.formatResults(data);
          }
          else{
            document.querySelector(".searchMovies__list").innerHTML = "Aucun film ne correspond à votre recherche.";
          }
        }
      }

      // Vérifie si le clic est à l'intérieur de la barre de recherche, sinon, on vide la liste
      document.addEventListener("click", function(event) {
        let search = document.querySelector(".search");
        let searchList = document.querySelector(".searchMovies__list");
        if (search && searchList && !search.contains(event.target)) {
            searchList.innerHTML = "";
        }
      });


      window.V = {};

      // Navigation
      V.renderNavBar = async function(hMovies, hProfiles, hProfilesList) {
        let header = document.querySelector("#content");
        header.innerHTML = NavBar.format(hMovies, hProfiles, hProfilesList);
      };

      // Movie
      V.renderMovie = async function () {
        let content = document.querySelector("#content");
        let categories = await C.readCategorie();
        content.innerHTML = NewMovieForm.format(categories, "C.handlerAddMovie()", "C.handlerAnnuler()");
      };

      V.renderMovieFeatured = function () {
        let content = document.querySelector("#content");
        content.innerHTML = MovieFeaturedForm.format("Search.format()");
      };

      // Profile
      V.renderProfile = function () {
        let content = document.querySelector("#content");
        content.innerHTML = NewProfileForm.format("C.handlerAddProfile()", "C.handlerAnnuler()");
      };

      V.renderProfileList = async function () {
        let content = document.querySelector("#header");
        let profile = await C.readProfile();
        document.querySelector("#content").innerHTML = "";
        content.innerHTML = ProfileList.format(profile);
      };

      V.renderProfileUpdate = function (id, pseudo, avatar, age) {
        let content = document.querySelector("#content");
        content.innerHTML = ProfileUpdateForm.format(id, pseudo, avatar, age, "C.handlerConfirmUpdate()", "C.handlerAnnuler()");
      };

      C.start();
    </script>

    <!-- Icônes SVG -->
    <svg 
      aria-hidden="true" 
      style="position: absolute; 
      width: 0; height: 0; 
      overflow: hidden;" 
      version="1.1" 
      xmlns="http://www.w3.org/2000/svg">

      <symbol 
        id="icon-arrow-right" 
        viewBox="0 0 24 24" 
        fill="none">
        <path 
          d="M5 12H19M19 12L12 5M19 12L12 19" 
          stroke="currentColor" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
      </symbol>

      <symbol 
        id="icon-check" 
        viewBox="0 0 24 24" 
        fill="none">
        <path 
          d="M20 6L9 17L4 12" 
          stroke="currentColor" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
      </symbol>

      <symbol 
        id="icon-cross" 
        viewBox="0 0 24 24" 
        fill="none">
        <path 
          d="M18 6L6 18M6 6L18 18" 
          stroke="currentColor" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
      </symbol>

    </svg>
  </body>
</html>
