<li class="searchMovies__item">
    <figure class="searchMovies__film" onclick="C.handlerUpdateMovieFeatured({{id}}, '{{titre}}', '{{img}}', '{{category}}', {{statut}})">
        <img class="searchMovies__affiche" src="{{img}}" alt="">
        <figcaption class="searchMovies__infos">
            <h3 class="searchMovies__title">{{titre}}</h3>
        </figcaption>
    </figure>
</li>
